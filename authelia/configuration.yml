server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

jwt_secret: ${AUTHELIA_JWT_SECRET}

default_redirection_url: https://uptime.${DOMAIN}

authentication_backend:
  ldap:
    implementation: activedirectory
    url: ldap://${AD_SERVER_IP}
    timeout: 5s
    start_tls: false
    base_dn: ${AD_BASE_DN}
    username_attribute: sAMAccountName
    additional_users_dn: ${AD_USER_OU}
    users_filter: (&({username_attribute}={input})(objectClass=person))
    additional_groups_dn: ${AD_GROUP_OU}
    groups_filter: (&(member={dn})(objectClass=group))
    group_name_attribute: cn
    mail_attribute: mail
    display_name_attribute: displayName
    user: ${AD_SERVICE_ACCOUNT}
    password: ${AD_SERVICE_PASSWORD}

access_control:
  default_policy: deny
  rules:
    - domain: uptime.${DOMAIN}
      policy: one_factor
    - domain: traefik.${DOMAIN}
      policy: one_factor

session:
  name: authelia_session
  secret: ${AUTHELIA_SESSION_SECRET}
  expiration: 3600
  inactivity: 300
  domain: ${DOMAIN}

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 10m

storage:
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
```

---

## File Structure
```
your-project/
├── .env                          # ← all secrets here
├── docker-compose.yml
└── authelia/
    └── configuration.yml
```

---

## How Variables Flow
```
.env
 │
 ├──→ docker-compose.yml          (uses ${VAR} directly)
 │         │
 │         └──→ authelia container (passes via environment: block)
 │
 └──→ authelia/configuration.yml  (uses ${VAR} natively)