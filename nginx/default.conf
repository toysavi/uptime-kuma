# ================================================================
#  nginx/default.conf — Uptime Kuma SSL reverse proxy
#  kuma.phillipbank.com.kh
# ================================================================

# Docker's internal DNS — resolves kuma-app lazily at request time
# (prevents "host not found" crash if kuma-app starts slowly)
resolver 127.0.0.11 valid=10s ipv6=off;

# ── HTTPS ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name kuma.phillipbank.com.kh;

    ssl_certificate     /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Variable forces runtime DNS resolution instead of startup
    set $upstream http://kuma-app:3001;

    location / {
        proxy_pass             $upstream;
        proxy_http_version     1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support — required by Uptime Kuma live dashboard
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
    }

    # Docker healthcheck endpoint
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    server_name kuma.phillipbank.com.kh;
    return 301 https://$host$request_uri;
}
