version: "3.9"

services:

  kuma-app:
    image: louislam/uptime-kuma:2.2.0
    environment:
      DB_TYPE: mysql
      DB_HOST: kuma-mysql
      DB_PORT: 3306
      DB_NAME: uptimekuma
      DB_USER: kuma
      DB_PASSWORD: kumapass
    volumes:
      - kuma-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock   # for container monitoring
    networks:
      - kuma-net
    ports:
      - "3001:3001"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
      labels:
        - kuma.monitor=true
        - kuma.service=kuma-app

  kuma-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: uptimekuma
      MYSQL_USER: kuma
      MYSQL_PASSWORD: kumapass
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - kuma-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - kuma.monitor=true
        - kuma.service=kuma-mysql

  kuma-nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - kuma-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - kuma.monitor=true
        - kuma.service=kuma-nginx

networks:
  kuma-net:
    driver: overlay

volumes:
  mysql-data:
  kuma-data:
