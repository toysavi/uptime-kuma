version: "3.9"

services:

  kuma-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - kuma-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: on-failure

  kuma-app:
    # ── Build your own image instead of pulling from Docker Hub ──
    build:
      context: .                  # folder containing Dockerfile
      dockerfile: Dockerfile
      args:
        # These become the baked-in ENV defaults inside the image.
        # They can still be overridden at runtime via `environment:`
        # below, which takes precedence.
        DB_TYPE:     ${KU_DB_TYPE}
        DB_HOST:     ${KU_DB_HOST}
        DB_PORT:     ${KU_DB_PORT}
        DB_NAME:     ${KU_DB_NAME}
        DB_USER:     ${KU_DB_USER}
        DB_PASSWORD: ${KU_DB_PASSWORD}
    # Tag the built image so rolling updates and caching work
    image: my-uptime-kuma:latest
    environment:
      # Runtime override — always wins over baked-in ARG defaults
      DB_TYPE:     ${KU_DB_TYPE}
      DB_HOST:     ${KU_DB_HOST}
      DB_PORT:     ${KU_DB_PORT}
      DB_NAME:     ${KU_DB_NAME}
      DB_USER:     ${KU_DB_USER}
      DB_PASSWORD: ${KU_DB_PASSWORD}
    volumes:
      - kuma-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - kuma-net
    ports:
      - "3001:3001"
    depends_on:
      kuma-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/status-page/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: on-failure

  kuma-nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - kuma-net
    depends_on:
      kuma-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || nginx -t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: on-failure

networks:
  kuma-net:
    driver: bridge

volumes:
  mysql-data:
  kuma-data: